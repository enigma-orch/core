services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enigma_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drip}
      POSTGRES_DB: ${POSTGRES_DB:-drip}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drip}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: ghcr.io/amacneil/dbmate:2
    command: up
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-drip}:${POSTGRES_PASSWORD:-drip}@postgres:5432/${POSTGRES_DB:-drip}?sslmode=disable"
      DBMATE_MIGRATIONS_DIR: /db/migrations
      DBMATE_SCHEMA_FILE: /db/schema.sql
    volumes:
      - ./db:/db
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  rustfs:
    image: rustfs/rustfs:latest
    container_name: enigma_rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-drip-access-key}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-drip-secret-key}
      RUSTFS_ALLOW_INSECURE_DEFAULT_CREDENTIALS: "true"
    volumes:
      - rustfs_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enigma_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agentic:
    build: ../services/agentic
    container_name: enigma_agentic
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-drip}:${POSTGRES_PASSWORD:-drip}@postgres:5432/${POSTGRES_DB:-drip}"
      RUSTFS_ENDPOINT: "http://rustfs:9000"
      RUSTFS_PUBLIC_URL: "http://rustfs:9000"
      REDIS_URL: "redis://redis:6379"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8000}"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ../services/api
    container_name: enigma_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      POSTGRES_DB: "postgres://${POSTGRES_USER:-drip}:${POSTGRES_PASSWORD:-drip}@postgres:5432/${POSTGRES_DB:-drip}?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rustfs_data:
  redis_data:
