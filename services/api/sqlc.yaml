version: "2"

sql:
  - engine: "postgresql"
    schema: "../../infra/db/schema.sql"
    queries: "sqlc/queries"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
